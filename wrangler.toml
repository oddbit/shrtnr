name = "shrtnr"
main = "src/index.tsx"
compatibility_date = "2026-03-30"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "shrtnr-db"
database_id = "943b05f1-6eb1-4552-b27a-6d8c055ff25f"
migrations_dir = "migrations"

# KV namespace for MCP OAuth session state
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "PLACEHOLDER_REPLACE_WITH_ACTUAL_KV_ID"

# Durable Object for MCP agent sessions
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "ShrtnrMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ShrtnrMCP"]

name = "shrtnr"
main = "src/index.tsx"
assets = { directory = "public" }

# LOL
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "shrtnr-db"
migrations_dir = "migrations"

# KV namespace for MCP OAuth session state
[[kv_namespaces]]
binding = "OAUTH_KV"

# Durable Object for MCP agent sessions
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "ShrtnrMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ShrtnrMCP"]

# Cloudflare Access audience tag for admin route JWT validation.
# Set via: wrangler secret put ACCESS_AUD
# Find this value in the Cloudflare Zero Trust dashboard under
# Access > Applications > your app > Overview > Application Audience (AUD) Tag.

name = "shrtnr"
main = "src/index.tsx"
compatibility_date = "2026-03-30"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "shrtnr-db"
migrations_dir = "migrations"

# KV namespace for MCP OAuth session state
# ID resolved at deploy time by scripts/resolve-d1-id.js
[[kv_namespaces]]
binding = "OAUTH_KV"

# Durable Object for MCP agent sessions
[[durable_objects.bindings]]
name = "MCP_OBJECT"
class_name = "ShrtnrMCP"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ShrtnrMCP"]
